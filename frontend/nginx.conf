server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS so upstream IPs are re-resolved after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API calls to the FastAPI backend
    # rewrite strips /api prefix before forwarding; variable forces DNS re-resolution
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
